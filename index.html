<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valentrax — Inteligência para o fluxo hospitalar</title>
    <meta name="description" content="Valentrax Healthcare Operations — plataforma de inteligência operacional para saúde: indicadores assistenciais, ocupação, giro de leitos, SCIH e desempenho institucional em um único ambiente analítico." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      /* ── Tema Valentrax (claro/escuro) ── valores padrão = ESCURO (azul-marinho corporativo) */
      :root {
        --bg:#0c1220; --bg-2:#101a2c; --surface:#142238; --surface-2:#121e33; --surface-3:#1a2a44;
        --input-bg:#0d1728; --border:#22334f; --border-2:#2e4368;
        --text:#e9eef5; --text-2:#c9d4e3; --text-3:#8fa2bd; --text-muted:#5b6f8f;
      }
      :root[data-theme="light"] {
        --bg:#eef1f5; --bg-2:#ffffff; --surface:#ffffff; --surface-2:#f7f9fb; --surface-3:#edf1f6;
        --input-bg:#f2f5f8; --border:#d9e0e8; --border-2:#c4cfdc;
        --text:#16202e; --text-2:#31404f; --text-3:#54657a; --text-muted:#8595a8;
      }
      body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    </style>
    <script>try{document.documentElement.setAttribute('data-theme', localStorage.getItem('hnsn_theme')||'dark')}catch(e){}</script>
  </head>
  <body>
    <div id="root"></div>
    <!-- As credenciais do Supabase vêm das variáveis VITE_SUPABASE_URL / VITE_SUPABASE_KEY
         (configuradas na Vercel e no .env local). Ver README / .env.example. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
